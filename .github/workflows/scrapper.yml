name: Scrapper Vinted - PheeA Fashion

on:
  schedule:
    - cron: '0 * * * *'   # Toutes les heures
  workflow_dispatch:        # Bouton manuel dans GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scrapper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scrapper_vinted.py

      - name: Commit & push data.json
        run: |
          git config user.name "PheeA Bot"
          git config user.email "bot@pheeafashion.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update $(date '+%d/%m/%Y %H:%M')"
          git push
